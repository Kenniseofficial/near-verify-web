<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEAR NFT Holder Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/near-api-js@0.44.2/dist/near-api-js.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { font-size: 24px; margin-bottom: 20px; color: #00ec5b; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 30px; }
        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2b2b2b;
            color: #fff;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #00ec5b;
            border: none;
            border-radius: 5px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #00c44b; }
        .logout-btn {
            background-color: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            margin-top: 10px;
            padding: 8px;
            font-size: 12px;
        }
        .logout-btn:hover { background-color: rgba(255,77,77,0.1); }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>NFT Verification</h1>
    <p>Connect your NEAR wallet and provide your Discord User ID to claim your exclusive server role.</p>
    
    <div id="wallet-section">
        <button id="auth-btn">Connect NEAR Wallet</button>
    </div>

    <div id="verify-section" style="display: none;">
        <p>Connected as: <span id="account-display" style="color: #00ec5b; font-weight: bold;"></span></p>
        <input type="text" id="discord-id" placeholder="Enter Discord User ID (e.g. 4513...)">
        <button id="verify-btn">Verify Ownership</button>
        <button id="logout-btn" class="logout-btn">Disconnect Wallet</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const CONTRACT_ID = "asac.near"; 
    const BACKEND_URL = "https://near-bot-backend.onrender.com/verify";

    const nearConfig = {
        networkId: "mainnet",
        nodeUrl: "https://rpc.mainnet.near.org",
        walletUrl: "https://wallet.near.org",
        helperUrl: "https://helper.mainnet.near.org",
        explorerUrl: "https://explorer.mainnet.near.org",
    };

    async function initNear() {
        const near = await nearAPI.connect(Object.assign({ deps: { keyStore: new nearAPI.keyStores.BrowserLocalStorageKeyStore() } }, nearConfig));
        const walletConnection = new nearAPI.WalletConnection(near);

        const authBtn = document.getElementById('auth-btn');
        const walletSection = document.getElementById('wallet-section');
        const verifySection = document.getElementById('verify-section');
        const accountDisplay = document.getElementById('account-display');
        const verifyBtn = document.getElementById('verify-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const statusDiv = document.getElementById('status');

        if (walletConnection.isSignedIn()) {
            walletSection.style.display = 'none';
            verifySection.style.display = 'block';
            const accountId = walletConnection.getAccountId();
            accountDisplay.innerText = accountId;

            verifyBtn.onclick = async () => {
                const discordId = document.getElementById('discord-id').value.trim();
                if (!discordId) {
                    statusDiv.innerText = "❌ Please enter your Discord User ID!";
                    statusDiv.style.color = "#ff4d4d";
                    return;
                }

                statusDiv.innerText = "⏳ Checking NFT balances...";
                statusDiv.style.color = "#00ec5b";

                try {
                    const account = walletConnection.account();
                    // Call contract to check user balance items
                    const balance = await account.viewFunction(CONTRACT_ID, "nft_supply_for_owner", { account_id: accountId });
                    const hasNft = parseInt(balance) > 0;

                    statusDiv.innerText = "📡 Submitting verification data...";

                    const response = await fetch(BACKEND_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            discordId: discordId, 
                            walletAddress: accountId, // Added wallet address track
                            hasNft: hasNft 
                        })
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        statusDiv.innerText = "✅ Success! Your Discord role has been assigned.";
                        statusDiv.style.color = "#00ec5b";
                    } else {
                        statusDiv.innerText = result.error || "❌ Verification processing failed.";
                        statusDiv.style.color = "#ff4d4d";
                    }
                } catch (err) {
                    console.error(err);
                    statusDiv.innerText = "❌ Connection or blockchain lookup error.";
                    statusDiv.style.color = "#ff4d4d";
                }
            };

            logoutBtn.onclick = () => {
                walletConnection.signOut();
                window.location.reload();
            };

        } else {
            authBtn.onclick = () => {
                walletConnection.requestSignIn(CONTRACT_ID, "NEAR NFT Verification Bot");
            };
        }
    }

    window.onload = initNear;
</script>
</body>
</html>
