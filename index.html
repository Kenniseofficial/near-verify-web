<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEAR NFT Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/near-api-js@0.44.2/dist/near-api-js.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0a1128; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1c2541; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h2 { margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #00ec5b; border: none; color: #0a1128; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        button:hover { background-color: #00c44b; }
        .status { margin-top: 20px; font-weight: bold; font-size: 14px; }
        .error { color: #ff4d4d; }
        .success { color: #00ec5b; }
    </style>
</head>
<body>

<div class="card">
    <h2>Verify Your NEAR NFT</h2>
    <p style="color: #8c92ac; font-size: 14px;">Enter your NEAR Account ID and Discord User ID below to scan for your server role.</p>
    
    <input type="text" id="nearId" placeholder="example.near or example.tg">
    <input type="text" id="discordId" placeholder="Discord User ID">
    
    <button onclick="startVerification()">Verify Holdings</button>
    <div id="statusMessage" class="status"></div>
</div>

<script>
    const BACKEND_URL = "https://near-verify-web.onrender.com";

    async function startVerification() {
        const nearId = document.getElementById('nearId').value.trim();
        const discordId = document.getElementById('discordId').value.trim();
        const statusMessage = document.getElementById('statusMessage');

        if (!nearId || !discordId) {
            statusMessage.className = "status error";
            statusMessage.innerText = "❌ Please fill in both fields.";
            return;
        }

        statusMessage.className = "status";
        statusMessage.innerText = "🔍 Checking wallet holdings...";

        try {
            const response = await fetch(`${BACKEND_URL}/verify`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ discordId: discordId, hasNft: true })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                statusMessage.className = "status success";
                statusMessage.innerText = "🎉 Success! The ForestNEARian role has been assigned!";
            } else {
                statusMessage.className = "status error";
                statusMessage.innerText = `❌ Bot error: ${data.error || "Verification failed."}`;
            }
        } catch (err) {
            console.error(err);
            statusMessage.className = "status error";
            statusMessage.innerText = "❌ Network connection error. Is backend offline?";
        }
    }
</script>

</body>
</html>
