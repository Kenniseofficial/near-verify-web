<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEAR NFT Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; text-align: center; padding: 50px 20px; }
        .card { background: #16162a; padding: 30px; border-radius: 12px; display: inline-block; max-width: 400px; width: 100%; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: none; box-sizing: border-box; }
        input { background: #252542; color: #fff; }
        button { background: #00ec5b; color: #000; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verify Your NEAR NFT</h2>
        <p>Enter your NEAR Account ID and Discord User ID below to scan for your server role.</p>
        
        <input type="text" id="nearAddress" placeholder="example.near">
        <input type="text" id="discordId" placeholder="Your Discord User ID (Numeric)">
        <button onclick="checkOwnership()">Verify Holdings</button>
        
        <div id="status"></div>
    </div>

    <script>
        // Adjust these to match your exact collection details
        const NFT_CONTRACT_ID = "ofp_collection.nfts.tg"; 
        const BOT_API_URL = "https://your-bot-backend.example.com"; // We will update this later

        async function checkOwnership() {
            const accountId = document.getElementById('nearAddress').value.trim();
            const discordId = document.getElementById('discordId').value.trim();
            const statusDiv = document.getElementById('status');

            if(!accountId || !discordId) {
                statusDiv.innerText = "❌ Please fill out both fields.";
                statusDiv.style.color = "#ff4a4a";
                return;
            }

            statusDiv.innerText = "⏳ Scanning blockchain...";
            statusDiv.style.color = "#ffdf00";

            try {
                const argsBase64 = btoa(JSON.stringify({ account_id: accountId }));
                const response = await fetch("https://rpc.mainnet.near.org", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        jsonrpc: "2.0", id: "web-query", method: "query",
                        params: {
                            request_type: "call_function", finality: "final",
                            account_id: NFT_CONTRACT_ID, method_name: "nft_supply_for_owner",
                            args_base64: argsBase64
                        }
                    })
                });

                const data = await response.json();
                if (data.result && data.result.result) {
                    const rawString = String.fromCharCode(...data.result.result);
                    const count = parseInt(JSON.parse(rawString));

                    if (count > 0) {
                        statusDiv.innerText = `✅ Found ${count} NFTs! Sending details to your Discord server...`;
                        statusDiv.style.color = "#00ec5b";
                        
                        // Send verification data over to your running bot script
                        await fetch(`${BOT_API_URL}/verify`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ discordId: discordId, hasNft: true })
                        });
                    } else {
                        statusDiv.innerText = "❌ No matching NFTs found in this wallet.";
                        statusDiv.style.color = "#ff4a4a";
                    }
                }
            } catch (err) {
                statusDiv.innerText = "❌ Error reaching network.";
                statusDiv.style.color = "#ff4a4a";
            }
        }
    </script>
</body>
</html>
