<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEAR NFT Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-700">
        <h1 class="text-2xl font-bold text-center mb-2">Verify Your NEAR NFT</h1>
        <p class="text-slate-400 text-sm text-center mb-6">Enter your NEAR Account ID and Discord User ID below to scan for your server role.</p>
        
        <form id="verifyForm" class="space-y-4">
            <div>
                <input type="text" id="nearId" placeholder="example.near or example.tg" required
                    class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500">
            </div>
            <div>
                <input type="text" id="discordId" placeholder="Discord User ID (Numeric)" required
                    class="w-full p-3 rounded-lg bg-slate-900 border border-slate-700 text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500">
            </div>
            <button type="submit" id="btnText"
                class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold p-3 rounded-lg transition-colors">
                Verify Holdings
            </button>
        </form>
        <div id="status" class="mt-4 text-center font-semibold hidden"></div>
    </div>

    <script>
        const contractId = "ofp_collection.nfts.tg";
        const backendUrl = "https://midnight-usb-bailey-owns.trycloudflare.com";

        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nearId = document.getElementById('nearId').value.trim();
            const discordId = document.getElementById('discordId').value.trim();
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('btnText');

            statusDiv.className = "mt-4 text-center font-semibold text-yellow-400";
            statusDiv.innerText = "🔍 Scanning blockchain entries...";
            statusDiv.classList.remove('hidden');

            try {
                const response = await fetch("https://rpc.mainnet.near.org", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        jsonrpc: "2.0",
                        id: "dontcare",
                        method: "query",
                        params: {
                            request_type: "call_function",
                            finality: "final",
                            account_id: contractId,
                            method_name: "nft_tokens_for_owner",
                            args_base64: btoa(JSON.stringify({ account_id: nearId }))
                        }
                    })
                });

                const data = await response.json();
                
                if (data.result && data.result.result) {
                    const resultString = String.fromCharCode(...data.result.result);
                    const tokens = JSON.parse(resultString);

                    if (tokens.length > 0) {
                        statusDiv.className = "mt-4 text-center font-semibold text-emerald-400";
                        statusDiv.innerText = "📡 NFT Found! Connecting to Discord bot...";

                        const botResponse = await fetch(`${backendUrl}/verify`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ discordId, hasNft: true })
                        });

                        const botData = await botResponse.json();
                        if (botData.success) {
                            statusDiv.className = "mt-4 text-center font-semibold text-emerald-400";
                            statusDiv.innerText = "✅ Success! Exclusive role added inside Discord.";
                        } else {
                            statusDiv.className = "mt-4 text-center font-semibold text-red-400";
                            statusDiv.innerText = "❌ Bot error: User ID could not be matched.";
                        }
                    } else {
                        statusDiv.className = "mt-4 text-center font-semibold text-red-400";
                        statusDiv.innerText = "❌ Verification failed: No qualifying NFTs found.";
                    }
                }
            } catch (err) {
                statusDiv.className = "mt-4 text-center font-semibold text-red-400";
                statusDiv.innerText = "❌ Error reaching network.";
            }
        });
    </script>
</body>
</html>
